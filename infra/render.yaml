services:
  - type: web
    name: ikr-api
    runtime: node
    rootDir: apps/api
    buildCommand: cd ../.. && pnpm install && pnpm --filter @ikr/db build && pnpm --filter @ikr/ai build && pnpm --filter @ikr/shared build && pnpm --filter @ikr/api build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

  - type: worker
    name: ikr-worker
    runtime: node
    rootDir: apps/api
    buildCommand: cd ../.. && pnpm install && pnpm --filter @ikr/db build && pnpm --filter @ikr/ai build && pnpm --filter @ikr/shared build && pnpm --filter @ikr/api build
    startCommand: node dist/workers/index.js
    envVars:
      - key: NODE_ENV
        value: production
